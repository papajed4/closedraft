<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | CloseDraft</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        primary: '#6366f1',
                        background: '#0b1326',
                        surface: '#131b2e',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0b1326;
            color: #dae2fd;
            animation: fadeIn 0.3s ease-out;
        }

        .glass-card {
            background: rgba(23, 31, 51, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .gradient-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        }

        .input-glass {
            background: rgba(11, 19, 38, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: white;
            transition: all 0.2s ease;
        }

        .input-glass:focus {
            border-color: #6366f1;
            outline: none;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 24px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.error {
            background: #7f1d1d;
        }

        .toast.success {
            background: #14532d;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-left-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .password-strength {
            height: 4px;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        /* Smooth page transitions */

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(8px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        a,
        button {
            transition: all 0.2s ease !important;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-5 relative">

    <!-- Background Ambience -->
    <div class="fixed inset-0 overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-20%] left-[-20%] w-[60%] h-[60%] bg-indigo-600/15 rounded-full blur-[150px]"></div>
        <div class="absolute bottom-[-20%] right-[-20%] w-[60%] h-[60%] bg-purple-600/10 rounded-full blur-[150px]">
        </div>
    </div>

    <!-- Main Content -->
    <div class="w-full max-w-md">

        <!-- Logo -->
        <div class="flex items-center justify-center gap-2 mb-8">
            <div
                class="w-8 h-8 gradient-primary rounded-lg flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <span class="text-xl font-bold text-white tracking-tight">Close<span
                    class="text-indigo-400">Draft</span></span>
        </div>

        <!-- Signup Card -->
        <div class="glass-card rounded-3xl p-8">
            <h1 class="text-2xl font-bold text-white text-center mb-2">Create your account</h1>
            <p class="text-slate-400 text-sm text-center mb-8">Start tracking clients and writing better emails</p>

            <!-- Google Sign Up Button -->
            <button onclick="signUpWithGoogle()" id="googleSignUpBtn"
                class="w-full bg-white hover:bg-gray-100 text-gray-800 font-medium py-3 px-4 rounded-xl flex items-center justify-center gap-3 transition-all shadow-lg">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="#34A853"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                    <path fill="#EA4335"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                Sign up with Google
            </button>

            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-white/10"></div>
                </div>
                <div class="relative flex justify-center text-xs">
                    <span class="px-3 bg-slate-900/50 text-slate-500">or</span>
                </div>
            </div>

            <!-- Email Signup Form -->
            <form id="signupForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase tracking-wider">Full
                        Name</label>
                    <input type="text" id="signupName" required placeholder="John Doe"
                        class="w-full px-4 py-3 rounded-xl input-glass text-white placeholder-slate-500">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase tracking-wider">Email</label>
                    <input type="email" id="signupEmail" required placeholder="you@example.com"
                        class="w-full px-4 py-3 rounded-xl input-glass text-white placeholder-slate-500">
                </div>

                <div>
                    <label
                        class="block text-xs font-bold text-slate-400 mb-1.5 uppercase tracking-wider">Password</label>
                    <div class="relative">
                        <input type="password" id="signupPassword" required placeholder="••••••••" minlength="8"
                            class="w-full px-4 py-3 rounded-xl input-glass text-white placeholder-slate-500 pr-12">
                        <button type="button" onclick="togglePassword('signupPassword')"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white">
                            <svg id="signupEyeIcon" class="w-5 h-5" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                                </path>
                            </svg>
                        </button>
                    </div>
                    <div class="mt-2 h-1.5 bg-slate-700 rounded-full overflow-hidden">
                        <div id="passwordStrengthBar" class="password-strength bg-red-500 w-0"></div>
                    </div>
                    <p class="text-xs text-slate-500 mt-1">At least 8 characters</p>

                </div>

                <div class="flex items-start gap-2">
                    <input type="checkbox" id="agreeTerms" required
                        class="w-4 h-4 mt-0.5 rounded bg-slate-700 border-white/10 text-indigo-500 focus:ring-0">
                    <label for="agreeTerms" class="text-xs text-slate-400">
                        I agree to the <a href="#" class="text-indigo-400 hover:text-indigo-300">Terms of Service</a>
                        and <a href="#" class="text-indigo-400 hover:text-indigo-300">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" id="signupSubmitBtn"
                    class="w-full gradient-primary text-white font-semibold py-3 rounded-xl transition-all shadow-lg shadow-indigo-500/25">
                    Create Account
                </button>
            </form>

            <p class="text-center text-slate-400 text-sm mt-6">
                Already have an account?
                <a href="/login.html" class="text-indigo-400 hover:text-indigo-300 font-medium">Sign in</a>
            </p>
        </div>

        <!-- Footer -->
        <p class="text-center text-slate-500 text-xs mt-8">
            © 2026 CloseDraft. All rights reserved.
        </p>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">
        <svg id="toastIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <span id="toastMsg" class="text-sm"></span>
    </div>

    <script>
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const eyeIcon = inputId === 'loginPassword'
                ? document.getElementById('loginEyeIcon')
                : document.getElementById('signupEyeIcon');

            if (input.type === 'password') {
                input.type = 'text';
                // Change to "eye off" icon
                eyeIcon.innerHTML = `
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>
        `;
            } else {
                input.type = 'password';
                // Change back to "eye" icon
                eyeIcon.innerHTML = `
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
        `;
            }
        }
    </script>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
</body>

</html>
