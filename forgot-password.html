<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | CloseDraft</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        primary: '#6366f1',
                        background: '#0b1326',
                        surface: '#131b2e',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0b1326;
            color: #dae2fd;
            animation: fadeIn 0.3s ease-out;
        }

        .glass-card {
            background: rgba(23, 31, 51, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .gradient-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        }

        .input-glass {
            background: rgba(11, 19, 38, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: white;
            transition: all 0.2s ease;
        }

        .input-glass:focus {
            border-color: #6366f1;
            outline: none;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 24px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.error {
            background: #7f1d1d;
        }

        .toast.success {
            background: #14532d;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-left-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Smooth page transitions */

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(8px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        a,
        button {
            transition: all 0.2s ease !important;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-5">
    <div class="w-full max-w-md">
        <div class="glass-card rounded-3xl p-8">
            <h1 class="text-2xl font-bold text-white text-center mb-2">Reset Password</h1>
            <p class="text-slate-400 text-sm text-center mb-8">Enter your email and we'll send you a reset link</p>

            <form id="resetForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1.5">Email</label>
                    <input type="email" id="resetEmail" required
                        class="w-full px-4 py-3 rounded-xl input-glass text-white">
                </div>
                <button type="submit" class="w-full gradient-primary text-white font-semibold py-3 rounded-xl">
                    Send Reset Link
                </button>
            </form>

            <p class="text-center text-slate-400 text-sm mt-6">
                <a href="/login.html" class="text-indigo-400 hover:text-indigo-300">← Back to Sign In</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = window.supabase.createClient('https://txibbsaodcpaturobeok.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4aWJic2FvZGNwYXR1cm9iZW9rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2ODkyODQsImV4cCI6MjA5MTI2NTI4NH0.1omA2j3QaFzr83KxqpQOSrRngu6mGkJB2d_PYDGNR24');

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value;

            const { error } = await supabase.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/reset-password.html'
            });

            if (error) {
                alert(error.message);
            } else {
                alert('Check your email for the reset link!');
                window.location.href = '/login.html';
            }
        });
    </script>
</body>

</html>
