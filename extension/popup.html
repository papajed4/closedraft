<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloseDraft</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 380px;
            min-height: 400px;
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            background: #0b1326;
            color: #dae2fd;
            padding: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .logo {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        .title {
            font-size: 18px;
            font-weight: 700;
            color: white;
        }

        .title span {
            color: #818cf8;
        }

        .status {
            margin-left: auto;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 20px;
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status.free {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
            border-color: rgba(245, 158, 11, 0.3);
        }

        .section {
            margin-bottom: 20px;
        }

        .label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748b;
            margin-bottom: 6px;
        }

        .client-info {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .client-name {
            font-size: 15px;
            font-weight: 600;
            color: white;
        }

        .client-email {
            font-size: 12px;
            color: #818cf8;
            margin-top: 2px;
        }

        select,
        textarea {
            width: 100%;
            padding: 10px 12px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 13px;
            font-family: inherit;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }

        select:focus,
        textarea:focus {
            outline: none;
            border-color: #6366f1;
        }

        .tone-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .tone-btn {
            padding: 6px 12px;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tone-btn:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.4);
            color: white;
        }

        .tone-btn.active {
            background: #6366f1;
            border-color: #6366f1;
            color: white;
        }

        .generate-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .generate-btn:hover {
            opacity: 0.9;
        }

        .generate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-area {
            margin-top: 16px;
            padding: 12px;
            background: rgba(30, 41, 59, 0.4);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .result-subject {
            font-weight: 600;
            color: white;
            margin-bottom: 8px;
        }

        .result-body {
            font-size: 12px;
            color: #cbd5e1;
            line-height: 1.5;
            max-height: 150px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .action-btn {
            flex: 1;
            padding: 8px;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: white;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: rgba(30, 41, 59, 0.8);
        }

        .action-btn.primary {
            background: #6366f1;
            border-color: #6366f1;
        }

        .upgrade-banner {
            text-align: center;
            padding: 16px;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 12px;
            margin-top: 16px;
        }

        .upgrade-banner p {
            margin-bottom: 12px;
            font-size: 13px;
        }

        .upgrade-btn {
            padding: 10px 20px;
            background: #f59e0b;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .hidden {
            display: none !important;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo">C</div>
        <div class="title">Close<span>Draft</span></div>
        <div class="status" id="planStatus">Pro</div>
    </div>

    <!-- Logged Out State -->
    <div id="loggedOutState" class="hidden">
        <div style="text-align: center; padding: 40px 20px;">
            <p style="margin-bottom: 20px;">Sign in to use CloseDraft</p>
            <button id="signInBtn" class="generate-btn">Sign In with Google</button>
        </div>
    </div>

    <!-- Free Plan State -->
    <div id="freePlanState" class="hidden">
        <div class="upgrade-banner">
            <p><strong>✨ Chrome Extension is a Pro feature</strong></p>
            <p style="font-size: 12px; margin-bottom: 16px;">Upgrade to Pro to generate emails directly in Gmail</p>
            <button id="upgradeBtn" class="upgrade-btn">Upgrade to Pro</button>
        </div>
    </div>

    <!-- Pro Plan State (Generator) -->
    <div id="proPlanState" class="hidden">
        <div class="client-info" id="clientInfo">
            <div class="client-name" id="clientName">Loading...</div>
            <div class="client-email" id="clientEmail"></div>
        </div>

        <div class="section">
            <div class="label">Email Type</div>
            <select id="emailType">
                <option value="Follow-up">Follow-up</option>
                <option value="Payment Reminder">Payment Reminder</option>
                <option value="Cold Outreach">Cold Outreach</option>
            </select>
        </div>

        <div class="section">
            <div class="label">Tone</div>
            <div class="tone-buttons">
                <button class="tone-btn active" data-tone="Friendly">Friendly</button>
                <button class="tone-btn" data-tone="Professional">Professional</button>
                <button class="tone-btn" data-tone="Firm">Firm</button>
                <button class="tone-btn" data-tone="Casual">Casual</button>
            </div>
        </div>

        <button class="generate-btn" id="generateBtn">
            <span id="generateBtnText">Generate Draft</span>
            <span id="generateLoader" class="loader hidden"></span>
        </button>

        <div id="resultSection" class="hidden">
            <div class="result-area">
                <div class="result-subject" id="resultSubject"></div>
                <div class="result-body" id="resultBody"></div>
            </div>
            <div class="actions">
                <button class="action-btn" id="copyBtn">Copy</button>
                <button class="action-btn primary" id="insertBtn">Insert into Gmail</button>
            </div>
        </div>
    </div>

    <script src="supabase.min.js"></script>
    <script src="popup.js"></script>
</body>

</html>
